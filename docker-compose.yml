services:
  bot:
    image: ghcr.io/kamoras/dead-by-daylight-twitch-bot:latest
    container_name: dbd-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data

  caddy:
    image: caddy:2-alpine
    container_name: dbd-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

name: Deploy

on:
  # Only runs after CI passes on main — ensures broken code is never deployed.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Allow manual redeploy from the Actions tab.
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: build-and-push
    concurrency: deploy-production

    steps:
      - uses: actions/checkout@v6

      - name: Create app directory on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: mkdir -p /opt/dbd-bot/data

      - name: Copy config files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: docker-compose.yml,Caddyfile
          target: /opt/dbd-bot/

      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cat > /opt/dbd-bot/.env <<'ENVEOF'
            TWITCH_BOT_USERNAME=${{ secrets.TWITCH_BOT_USERNAME }}
            TWITCH_BOT_TOKEN=${{ secrets.TWITCH_BOT_TOKEN }}
            QUEUE_ROLES_MODE=${{ secrets.QUEUE_ROLES_MODE || 'both' }}
            QUEUE_MAX_SIZE=${{ secrets.QUEUE_MAX_SIZE || '20' }}
            BOT_PREFIX=${{ secrets.BOT_PREFIX || '!' }}
            PORT=8080
            DOMAIN=${{ secrets.DOMAIN }}
            ENVEOF
            cd /opt/dbd-bot
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
